<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lego set</title>
        <style>
            body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
            table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
            th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
            th { font-weight: 600; }
            #error { color: red; }
        </style>
    </head>
    <body>
        <h1>Lego set</h1>
        <div id="error"></div>
        <p><strong>Set id:</strong> <span id="setId"></span></p>
        <p><strong>Set name:</strong> <span id="setName"></span></p>
        <table>
            <thead><tr><th>Image</th><th>Brick type</th><th>Color</th><th>Count</th></tr></thead>
            <tbody id="inventory"></tbody>
        </table>
        <script>
            const params = new URLSearchParams(window.location.search);
            const setId = params.get("id");
        
            fetch(`/api/set?id=${setId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById("error").textContent = data.error;
                        return;
                    }
        
                    // Set info
                    document.getElementById("setId").textContent = data.id;
                    document.getElementById("setName").textContent = data.name;
        
                    const table = document.getElementById("inventory");
                    table.innerHTML = "";
        
                    data.inventory.forEach(item => {
                        const row = document.createElement("tr");
        
                        row.innerHTML = `
                            <td>
                                ${item.preview_image_url ? `<img src="${item.preview_image_url}" width="50">` : ""}
                            </td>
                            <td>${item.name}</td>
                            <td>${item.color_id}</td>
                            <td>${item.count}</td>
                        `;
        
                        table.appendChild(row);
                    });
                })
                .catch(err => {
                    document.getElementById("error").textContent =
                        "Failed to load data: " + err;
                });
        </script>
    </body>
</html>
